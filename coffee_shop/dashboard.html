<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew Haven | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadUser(); loadProducts();">

<header class="main-header">
    <div class="header-content">
        <h1>☕ Brew Haven <span>Coffee Shop</span></h1>
        <div class="user-status">
            Admin: <strong id="userDisplay">Admin</strong>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </div>
</header>

<main class="dashboard-container">
    
    <div class="grid-top">
        <section class="card profile-card">
            <h3>Account Settings</h3>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="editUser" placeholder="New Username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="editPass" placeholder="New Password">
            </div>
            <button class="btn-primary" onclick="updateProfile()">Update Profile</button>
        </section>

        <section class="card add-product-card">
            <h3>Add New Product</h3>
            <div class="form-grid">
                <input type="text" id="prodName" placeholder="Product Name">
                <input type="number" id="prodPrice" placeholder="Price (₱)">
                <input type="text" id="prodImage" placeholder="Image URL (http://...)">
            </div>
            <button class="btn-success" onclick="addProduct()">Add to Menu</button>
        </section>
    </div>

    <section class="card list-section">
        <div class="section-header">
            <h2>Product Menu</h2>
            <p>Manage your coffee selections and pricing.</p>
        </div>
        <div id="productList" class="products-grid">
            </div>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
